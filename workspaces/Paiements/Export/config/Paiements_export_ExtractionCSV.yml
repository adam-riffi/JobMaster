script:
  id_script: Paiements_Export_ExtractionCSV
  description: Extraction du SOCLE paiements vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.paiements
    REP_EXPORT: C:\data\paiements\export
    NOM_FICHIER: paiements_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table paiements en CSV
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
