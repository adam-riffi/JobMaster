script:
  id_script: Paiements_Import_ControleCSV
  description: Validation structurelle des fichiers paiements avant chargement en staging

  parametres_env:
    REP_WORK: C:\data\paiements\work
    REP_ERR: C:\data\paiements\erreur
    MASQUE_PAIEMENTS: "^paiements_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.controle
      description: Valide le format et les colonnes des fichiers paiements
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_PAIEMENTS
        Colonnes: "id_paiement,id_facture,id_client,date_paiement,montant,mode_paiement"
        Separateur: ";"
        Encodage: UTF-8
        NonVide: true
        RepertoireErreur: £REP_ERR
