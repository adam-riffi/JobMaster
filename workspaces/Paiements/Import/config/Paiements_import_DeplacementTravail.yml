script:
  id_script: Paiements_Import_DeplacementTravail
  description: Déplacement des fichiers paiements de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\paiements\in
    REP_WORK: C:\data\paiements\work
    MASQUE_PAIEMENTS: "^paiements_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_PAIEMENTS
        Mode: deplacement
