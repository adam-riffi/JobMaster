script:
  id_script: Paiements_Aggregat_CumulGlissant
  description: Calcul des cumuls glissants sur 12 mois pour le domaine paiements

  parametres_env:
    TBL_HISTO: £BQ_HISTO.paiements_histo
    TBL_AGGR: £BQ_HISTO.paiements_aggr_mensuel

  jobs:
    - job_id: job.run.sql
      description: Recalcule le cumul glissant 12 mois
      parametres:
        Plateforme: BQ
        Requete: Paiements_aggregat_cumul_glissant_12m.gql
