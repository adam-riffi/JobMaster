script:
  id_script: Paiements_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE paiements par segment métier

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.paiements
    TBL_AGGR: £BQ_HISTO.paiements_aggr_mensuel
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: BQ
        Requete: Paiements_aggregat_delete_mensuel.gql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: BQ
        Requete: Paiements_aggregat_insert_mensuel_segment.gql
