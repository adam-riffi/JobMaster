-- Création de la table SOCLE paiements (BigQuery)
CREATE TABLE IF NOT EXISTS £BQ_SOCLE.paiements (
  id_paiement                         STRING NOT NULL
  id_facture                          STRING
  id_client                           STRING
  date_paiement                       DATE
  montant                             NUMERIC
  mode_paiement                       STRING
  statut                              STRING
  reference_bancaire                  STRING
  date_maj                            TIMESTAMP
);
