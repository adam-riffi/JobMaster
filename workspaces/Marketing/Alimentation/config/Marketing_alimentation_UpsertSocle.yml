script:
  id_script: Marketing_Alimentation_UpsertSocle
  description: Alimentation du SOCLE campagnes depuis la staging par MERGE/UPSERT

  parametres_env:
    TBL_STAGING: £BQ_TMP.staging_campagnes
    TBL_SOCLE: £BQ_SOCLE.campagnes

  jobs:
    - job_id: job.run.sql
      description: Vérifie que la staging contient des données
      parametres:
        Plateforme: BQ
        Requete: Marketing_alimentation_check_staging.gql
        Variable: FLAG_STAGING_MARKETING

    - job_id: job.conditionnelle.si
      description: Upsert uniquement si la staging est peuplée
      parametres:
        Variable: FLAG_STAGING_MARKETING
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: MERGE staging → SOCLE campagnes
          parametres:
            Plateforme: BQ
            Requete: Marketing_alimentation_upsert_socle.gql

        - job_id: job.run.create_view
          description: Rafraîchit la vue métier campagnes
          parametres:
            Plateforme: BQ
            Table: £TBL_SOCLE
