script:
  id_script: Marketing_Import_ControleCSV
  description: Validation structurelle des fichiers marketing avant chargement en staging

  parametres_env:
    REP_WORK: C:\data\marketing\work
    REP_ERR: C:\data\marketing\erreur
    MASQUE_MARKETING: "^campagnes_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.controle
      description: Valide le format et les colonnes des fichiers marketing
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_MARKETING
        Colonnes: "id_campagne,code_segment,libelle,canal,date_debut,date_fin"
        Separateur: ";"
        Encodage: UTF-8
        NonVide: true
        RepertoireErreur: £REP_ERR
