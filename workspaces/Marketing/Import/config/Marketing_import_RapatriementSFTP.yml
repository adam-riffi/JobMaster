script:
  id_script: Marketing_Import_RapatriementSFTP
  description: Rapatriement des fichiers marketing depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://marketing-tool/campagnes/in
    REP_IN: C:\data\marketing\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers marketing depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
