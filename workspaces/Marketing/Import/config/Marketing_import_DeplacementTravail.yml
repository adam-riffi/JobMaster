script:
  id_script: Marketing_Import_DeplacementTravail
  description: Déplacement des fichiers marketing de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\marketing\in
    REP_WORK: C:\data\marketing\work
    MASQUE_MARKETING: "^campagnes_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_MARKETING
        Mode: deplacement
