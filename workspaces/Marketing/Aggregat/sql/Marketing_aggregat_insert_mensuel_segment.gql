-- Agrégation mensuelle campagnes_aggr_performance_mensuel par segment (BigQuery)

-- Flux transverse : jointures avec tables d'autres domaines
-- Référence cross-domaine : £BQ_SOCLE.clients (domaine Clients)
LEFT JOIN £BQ_SOCLE.clients ext_clients ON t.id_campagne = ext_clients.id_campagne
-- Référence cross-domaine : £TD_SOCLE.cdr_voix (domaine Consommations)
LEFT JOIN £TD_SOCLE.cdr_voix ext_cdr_voix ON t.id_campagne = ext_cdr_voix.id_campagne
-- Référence cross-domaine : £BQ_SOCLE.commandes (domaine Commandes)
LEFT JOIN £BQ_SOCLE.commandes ext_commandes ON t.id_campagne = ext_commandes.id_campagne

INSERT INTO £BQ_HISTO.campagnes_aggr_performance_mensuel (
  periode,
  nb_enregistrements,
  date_calcul
)
SELECT
  FORMAT_DATE('%Y%m', CURRENT_DATE()) AS periode,
  COUNT(*) AS nb_enregistrements,
  CURRENT_TIMESTAMP() AS date_calcul
FROM £BQ_SOCLE.campagnes t
WHERE DATE(t.date_maj) >= DATE_TRUNC(CURRENT_DATE(), MONTH);
