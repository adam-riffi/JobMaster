script:
  id_script: Marketing_Aggregat_CumulGlissant
  description: Calcul des cumuls glissants sur 12 mois pour le domaine marketing

  parametres_env:
    TBL_HISTO: £BQ_HISTO.campagnes_histo
    TBL_AGGR: £BQ_HISTO.campagnes_aggr_performance_mensuel

  jobs:
    - job_id: job.run.sql
      description: Recalcule le cumul glissant 12 mois
      parametres:
        Plateforme: BQ
        Requete: Marketing_aggregat_cumul_glissant_12m.gql
