script:
  id_script: Marketing_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE campagnes par segment métier

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.campagnes
    TBL_AGGR: £BQ_HISTO.campagnes_aggr_performance_mensuel
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: BQ
        Requete: Marketing_aggregat_delete_mensuel.gql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: BQ
        Requete: Marketing_aggregat_insert_mensuel_segment.gql
