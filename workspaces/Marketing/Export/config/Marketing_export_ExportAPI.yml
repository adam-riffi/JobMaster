script:
  id_script: Marketing_Export_ExportAPI
  description: Export du SOCLE campagnes vers l'API partenaire via extraction JSON

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.campagnes
    REP_EXPORT: C:\data\marketing\export
    API_DEST: https://api.marketing-platform.com/push
    NOM_FICHIER: marketing_api_£DATETIME.json

  jobs:
    - job_id: job.table.extraction
      description: Extrait le SOCLE campagnes en JSON
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: json

    - job_id: job.externe.export
      description: Pousse le JSON vers l'API partenaire
      parametres:
        Source: £REP_EXPORT
        Cible: £API_DEST
        Type: api
