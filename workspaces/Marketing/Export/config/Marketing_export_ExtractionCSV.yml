script:
  id_script: Marketing_Export_ExtractionCSV
  description: Extraction du SOCLE campagnes vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.campagnes
    REP_EXPORT: C:\data\marketing\export
    NOM_FICHIER: marketing_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table campagnes en CSV
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
