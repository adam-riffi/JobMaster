script:
  id_script: Interconnexion_Export_ExtractionCSV
  description: Extraction du SOCLE interconnexion vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.interconnexion
    REP_EXPORT: C:\data\interconnexion\export
    NOM_FICHIER: interconnexion_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table interconnexion en CSV
      parametres:
        Plateforme: TD
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
