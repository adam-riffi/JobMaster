script:
  id_script: Interconnexion_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE interconnexion par segment métier

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.interconnexion
    TBL_AGGR: £TD_HISTO.interconnexion_aggr_mensuel_operateur
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: TD
        Requete: Interconnexion_aggregat_delete_mensuel.dql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: TD
        Requete: Interconnexion_aggregat_insert_mensuel_segment.dql
