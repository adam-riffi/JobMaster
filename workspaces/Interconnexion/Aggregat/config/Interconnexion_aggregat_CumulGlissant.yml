script:
  id_script: Interconnexion_Aggregat_CumulGlissant
  description: Calcul des cumuls glissants sur 12 mois pour le domaine interconnexion

  parametres_env:
    TBL_HISTO: £TD_HISTO.interconnexion_histo
    TBL_AGGR: £TD_HISTO.interconnexion_aggr_mensuel_operateur

  jobs:
    - job_id: job.run.sql
      description: Recalcule le cumul glissant 12 mois
      parametres:
        Plateforme: TD
        Requete: Interconnexion_aggregat_cumul_glissant_12m.dql
