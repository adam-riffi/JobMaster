script:
  id_script: Interconnexion_Import_RapatriementSFTP
  description: Rapatriement des fichiers interconnexion depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://interconnexion-clearing/in
    REP_IN: C:\data\interconnexion\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers interconnexion depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
