script:
  id_script: Paie_Import_TraitementBatch
  description: Chargement en masse des fichiers paie en staging puis archivage

  parametres_env:
    REP_WORK: C:\data\paie\work
    REP_ARCH: C:\data\paie\archive
    MASQUE_PAIE: "^paie_\d{6}\.csv$"
    TBL_STAGING: £TD_TMP.staging_paie

  jobs:
    - job_id: job.fichier.comptage
      description: Compte les fichiers à traiter
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_PAIE
        Variable: NB_FICHIERS_PAIE

    - job_id: job.conditionnelle.si
      description: Lance le batch uniquement si des fichiers sont présents
      parametres:
        Variable: NB_FICHIERS_PAIE
        Valeur: "0"

    - job_id: job.process.batch
      description: Charge la staging depuis tous les fichiers puis archive
      parametres:
        Source: £REP_WORK
        SAS: £REP_WORK
        Archive: £REP_ARCH
      jobs:
        - job_id: job.run.sql
          description: Charge les fichiers dans la table staging TD
          parametres:
            Plateforme: TD
            Requete: Paie_import_chargement_staging.dql

        - job_id: job.fichier.manipulation
          description: Archive les fichiers traités
          parametres:
            Source: £REP_WORK
            Cible: £REP_ARCH
            Masque: £MASQUE_PAIE
            Mode: deplacement

    - job_id: job.fichier.effacement
      description: Purge les archives de plus de 3 mois
      parametres:
        Source: £REP_ARCH
        Duree: 3
