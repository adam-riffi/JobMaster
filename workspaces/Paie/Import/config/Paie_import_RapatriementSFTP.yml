script:
  id_script: Paie_Import_RapatriementSFTP
  description: Rapatriement des fichiers paie depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://sirh-system/paie/in
    REP_IN: C:\data\paie\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers paie depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
