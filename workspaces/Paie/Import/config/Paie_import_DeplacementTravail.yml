script:
  id_script: Paie_Import_DeplacementTravail
  description: Déplacement des fichiers paie de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\paie\in
    REP_WORK: C:\data\paie\work
    MASQUE_PAIE: "^paie_\d{6}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_PAIE
        Mode: deplacement
