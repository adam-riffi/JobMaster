script:
  id_script: Clients_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE clients par segment métier

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.clients
    TBL_AGGR: £BQ_HISTO.clients_aggr_mensuel
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: BQ
        Requete: Clients_aggregat_delete_mensuel.gql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: BQ
        Requete: Clients_aggregat_insert_mensuel_segment.gql
