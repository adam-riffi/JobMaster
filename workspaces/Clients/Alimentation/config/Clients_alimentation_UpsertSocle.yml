script:
  id_script: Clients_Alimentation_UpsertSocle
  description: Alimentation du SOCLE clients depuis la staging par MERGE/UPSERT

  parametres_env:
    TBL_STAGING: £BQ_TMP.staging_clients
    TBL_SOCLE: £BQ_SOCLE.clients

  jobs:
    - job_id: job.run.sql
      description: Vérifie que la staging contient des données
      parametres:
        Plateforme: BQ
        Requete: Clients_alimentation_check_staging.gql
        Variable: FLAG_STAGING_CLIENTS

    - job_id: job.conditionnelle.si
      description: Upsert uniquement si la staging est peuplée
      parametres:
        Variable: FLAG_STAGING_CLIENTS
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: MERGE staging → SOCLE clients
          parametres:
            Plateforme: BQ
            Requete: Clients_alimentation_upsert_socle.gql

        - job_id: job.run.create_view
          description: Rafraîchit la vue métier clients
          parametres:
            Plateforme: BQ
            Table: £TBL_SOCLE
