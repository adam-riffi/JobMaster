script:
  id_script: Clients_Import_ControleCSV
  description: Validation structurelle des fichiers clients avant chargement en staging

  parametres_env:
    REP_WORK: C:\data\clients\work
    REP_ERR: C:\data\clients\erreur
    MASQUE_CLIENTS: "^clients_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.controle
      description: Valide le format et les colonnes des fichiers clients
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_CLIENTS
        Colonnes: "id_client,nom,prenom,email,telephone,date_naissance"
        Separateur: ";"
        Encodage: UTF-8
        NonVide: true
        RepertoireErreur: £REP_ERR
