script:
  id_script: Clients_Import_DeplacementTravail
  description: Déplacement des fichiers clients de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\clients\in
    REP_WORK: C:\data\clients\work
    MASQUE_CLIENTS: "^clients_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_CLIENTS
        Mode: deplacement
