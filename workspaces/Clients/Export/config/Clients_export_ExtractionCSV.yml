script:
  id_script: Clients_Export_ExtractionCSV
  description: Extraction du SOCLE clients vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.clients
    REP_EXPORT: C:\data\clients\export
    NOM_FICHIER: clients_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table clients en CSV
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
