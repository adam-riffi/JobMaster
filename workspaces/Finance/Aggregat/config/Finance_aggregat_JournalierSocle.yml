script:
  id_script: Finance_Aggregat_JournalierSocle
  description: Agrégation journalière du SOCLE comptes_financiers vers l'historique

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.comptes_financiers
    TBL_HISTO: £BQ_HISTO.comptes_financiers_histo
    PERIODE: £DATE

  jobs:
    - job_id: job.run.sql
      description: Vérifie que le SOCLE a été alimenté aujourd'hui
      parametres:
        Plateforme: BQ
        Requete: Finance_aggregat_check_socle_jour.gql
        Variable: FLAG_SOCLE_FINANCE

    - job_id: job.conditionnelle.si
      description: Agrège uniquement si le SOCLE est à jour
      parametres:
        Variable: FLAG_SOCLE_FINANCE
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: Insère les données du jour dans l'historique
          parametres:
            Plateforme: BQ
            Requete: Finance_aggregat_insert_journalier.gql
