script:
  id_script: Finance_Export_ExtractionCSV
  description: Extraction du SOCLE comptes_financiers vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.comptes_financiers
    REP_EXPORT: C:\data\finance\export
    NOM_FICHIER: finance_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table comptes_financiers en CSV
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
