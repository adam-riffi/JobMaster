script:
  id_script: Finance_Import_RapatriementSFTP
  description: Rapatriement des fichiers finance depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://erp-finance/ecritures/in
    REP_IN: C:\data\finance\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers finance depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
