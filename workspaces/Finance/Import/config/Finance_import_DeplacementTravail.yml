script:
  id_script: Finance_Import_DeplacementTravail
  description: Déplacement des fichiers finance de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\finance\in
    REP_WORK: C:\data\finance\work
    MASQUE_FINANCE: "^ecritures_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_FINANCE
        Mode: deplacement
