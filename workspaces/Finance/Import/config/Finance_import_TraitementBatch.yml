script:
  id_script: Finance_Import_TraitementBatch
  description: Chargement en masse des fichiers finance en staging puis archivage

  parametres_env:
    REP_WORK: C:\data\finance\work
    REP_ARCH: C:\data\finance\archive
    MASQUE_FINANCE: "^ecritures_\d{8}\.csv$"
    TBL_STAGING: £BQ_TMP.staging_finance

  jobs:
    - job_id: job.fichier.comptage
      description: Compte les fichiers à traiter
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_FINANCE
        Variable: NB_FICHIERS_FINANCE

    - job_id: job.conditionnelle.si
      description: Lance le batch uniquement si des fichiers sont présents
      parametres:
        Variable: NB_FICHIERS_FINANCE
        Valeur: "0"

    - job_id: job.process.batch
      description: Charge la staging depuis tous les fichiers puis archive
      parametres:
        Source: £REP_WORK
        SAS: £REP_WORK
        Archive: £REP_ARCH
      jobs:
        - job_id: job.run.sql
          description: Charge les fichiers dans la table staging BQ
          parametres:
            Plateforme: BQ
            Requete: Finance_import_chargement_staging.gql

        - job_id: job.fichier.manipulation
          description: Archive les fichiers traités
          parametres:
            Source: £REP_WORK
            Cible: £REP_ARCH
            Masque: £MASQUE_FINANCE
            Mode: deplacement

    - job_id: job.fichier.effacement
      description: Purge les archives de plus de 3 mois
      parametres:
        Source: £REP_ARCH
        Duree: 3
