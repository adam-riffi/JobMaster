script:
  id_script: Recouvrement_Import_DeplacementTravail
  description: Déplacement des fichiers recouvrement de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\recouvrement\in
    REP_WORK: C:\data\recouvrement\work
    MASQUE_RECOUVREMENT: "^creances_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_RECOUVREMENT
        Mode: deplacement
