script:
  id_script: Recouvrement_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE creances par segment métier

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.creances
    TBL_AGGR: £TD_HISTO.recouvrement_aggr_mensuel_statut
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: TD
        Requete: Recouvrement_aggregat_delete_mensuel.dql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: TD
        Requete: Recouvrement_aggregat_insert_mensuel_segment.dql
