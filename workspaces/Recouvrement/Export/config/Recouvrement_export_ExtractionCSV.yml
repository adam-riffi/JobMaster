script:
  id_script: Recouvrement_Export_ExtractionCSV
  description: Extraction du SOCLE creances vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.creances
    REP_EXPORT: C:\data\recouvrement\export
    NOM_FICHIER: recouvrement_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table creances en CSV
      parametres:
        Plateforme: TD
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
