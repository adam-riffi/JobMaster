script:
  id_script: Fraude_Export_ExtractionCSV
  description: Extraction du SOCLE alertes_fraude vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.alertes_fraude
    REP_EXPORT: C:\data\fraude\export
    NOM_FICHIER: fraude_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table alertes_fraude en CSV
      parametres:
        Plateforme: TD
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
