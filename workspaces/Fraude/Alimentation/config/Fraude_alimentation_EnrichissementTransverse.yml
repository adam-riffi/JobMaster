script:
  id_script: Fraude_Alimentation_EnrichissementTransverse
  description: Enrichissement du SOCLE alertes_fraude avec données cross-domaine via transfert

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.alertes_fraude
    TBL_TMP_ENRICHI: £TD_TMP.alertes_fraude_enrichi

  jobs:
    - job_id: job.run.sql
      description: Prépare la table enrichie en croisant avec données transverses
      parametres:
        Plateforme: TD
        Requete: Fraude_alimentation_enrichissement_transverse.dql

    - job_id: job.run.transfert
      description: Transfère les données enrichies vers la plateforme cible
      parametres:
        PlateformeSource: TD
        TableSource: £TBL_TMP_ENRICHI
        PlateformeCible: BQ
        TableCible: £BQ_TMP.alertes_fraude_enrichi_sync
        Mode: FULL
