script:
  id_script: Produits_Aggregat_JournalierSocle
  description: Agrégation journalière du SOCLE produits vers l'historique

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.produits
    TBL_HISTO: £BQ_HISTO.produits_histo
    PERIODE: £DATE

  jobs:
    - job_id: job.run.sql
      description: Vérifie que le SOCLE a été alimenté aujourd'hui
      parametres:
        Plateforme: BQ
        Requete: Produits_aggregat_check_socle_jour.gql
        Variable: FLAG_SOCLE_PRODUITS

    - job_id: job.conditionnelle.si
      description: Agrège uniquement si le SOCLE est à jour
      parametres:
        Variable: FLAG_SOCLE_PRODUITS
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: Insère les données du jour dans l'historique
          parametres:
            Plateforme: BQ
            Requete: Produits_aggregat_insert_journalier.gql
