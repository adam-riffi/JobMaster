script:
  id_script: Produits_Alimentation_UpsertSocle
  description: Alimentation du SOCLE produits depuis la staging par MERGE/UPSERT

  parametres_env:
    TBL_STAGING: £BQ_TMP.staging_produits
    TBL_SOCLE: £BQ_SOCLE.produits

  jobs:
    - job_id: job.run.sql
      description: Vérifie que la staging contient des données
      parametres:
        Plateforme: BQ
        Requete: Produits_alimentation_check_staging.gql
        Variable: FLAG_STAGING_PRODUITS

    - job_id: job.conditionnelle.si
      description: Upsert uniquement si la staging est peuplée
      parametres:
        Variable: FLAG_STAGING_PRODUITS
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: MERGE staging → SOCLE produits
          parametres:
            Plateforme: BQ
            Requete: Produits_alimentation_upsert_socle.gql

        - job_id: job.run.create_view
          description: Rafraîchit la vue métier produits
          parametres:
            Plateforme: BQ
            Table: £TBL_SOCLE
