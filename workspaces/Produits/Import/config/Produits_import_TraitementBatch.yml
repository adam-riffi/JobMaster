script:
  id_script: Produits_Import_TraitementBatch
  description: Chargement en masse des fichiers produits en staging puis archivage

  parametres_env:
    REP_WORK: C:\data\produits\work
    REP_ARCH: C:\data\produits\archive
    MASQUE_PRODUITS: "^produits_\d{8}\.csv$"
    TBL_STAGING: £BQ_TMP.staging_produits

  jobs:
    - job_id: job.fichier.comptage
      description: Compte les fichiers à traiter
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_PRODUITS
        Variable: NB_FICHIERS_PRODUITS

    - job_id: job.conditionnelle.si
      description: Lance le batch uniquement si des fichiers sont présents
      parametres:
        Variable: NB_FICHIERS_PRODUITS
        Valeur: "0"

    - job_id: job.process.batch
      description: Charge la staging depuis tous les fichiers puis archive
      parametres:
        Source: £REP_WORK
        SAS: £REP_WORK
        Archive: £REP_ARCH
      jobs:
        - job_id: job.run.sql
          description: Charge les fichiers dans la table staging BQ
          parametres:
            Plateforme: BQ
            Requete: Produits_import_chargement_staging.gql

        - job_id: job.fichier.manipulation
          description: Archive les fichiers traités
          parametres:
            Source: £REP_WORK
            Cible: £REP_ARCH
            Masque: £MASQUE_PRODUITS
            Mode: deplacement

    - job_id: job.fichier.effacement
      description: Purge les archives de plus de 3 mois
      parametres:
        Source: £REP_ARCH
        Duree: 3
