script:
  id_script: Produits_Import_DeplacementTravail
  description: Déplacement des fichiers produits de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\produits\in
    REP_WORK: C:\data\produits\work
    MASQUE_PRODUITS: "^produits_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_PRODUITS
        Mode: deplacement
