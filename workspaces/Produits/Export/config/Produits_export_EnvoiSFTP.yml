script:
  id_script: Produits_Export_EnvoiSFTP
  description: Envoi des fichiers CSV produits vers le SFTP de distribution

  parametres_env:
    REP_EXPORT: C:\data\produits\export
    SFTP_DEST: sftp://distribution/produits/out
    MASQUE_EXPORT: "^produits_\\d{8}\\.csv$"

  jobs:
    - job_id: job.fichier.comptage
      description: Vérifie qu'il y a des fichiers à envoyer
      parametres:
        Source: £REP_EXPORT
        Masque: £MASQUE_EXPORT
        Variable: NB_EXPORT_PRODUITS

    - job_id: job.conditionnelle.si
      description: Envoie uniquement si des fichiers sont disponibles
      parametres:
        Variable: NB_EXPORT_PRODUITS
        Valeur: "0"

    - job_id: job.externe.export
      description: Envoie les CSV vers le SFTP de distribution
      parametres:
        Source: £REP_EXPORT
        Cible: £SFTP_DEST
        Type: sftp

    - job_id: job.fichier.effacement
      description: Purge les exports de plus de 1 mois
      parametres:
        Source: £REP_EXPORT
        Duree: 1
