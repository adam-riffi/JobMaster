script:
  id_script: Produits_Export_ExportAPI
  description: Export du SOCLE produits vers l'API partenaire via extraction JSON

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.produits
    REP_EXPORT: C:\data\produits\export
    API_DEST: https://api.catalogue.telecom/produits/sync
    NOM_FICHIER: produits_api_£DATETIME.json

  jobs:
    - job_id: job.table.extraction
      description: Extrait le SOCLE produits en JSON
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: json

    - job_id: job.externe.export
      description: Pousse le JSON vers l'API partenaire
      parametres:
        Source: £REP_EXPORT
        Cible: £API_DEST
        Type: api
