script:
  id_script: Contrats_Import_DeplacementTravail
  description: Déplacement des fichiers contrats de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\contrats\in
    REP_WORK: C:\data\contrats\work
    MASQUE_CONTRATS: "^contrats_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_CONTRATS
        Mode: deplacement
