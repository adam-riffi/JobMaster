script:
  id_script: Contrats_Import_ControleCSV
  description: Validation structurelle des fichiers contrats avant chargement en staging

  parametres_env:
    REP_WORK: C:\data\contrats\work
    REP_ERR: C:\data\contrats\erreur
    MASQUE_CONTRATS: "^contrats_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.controle
      description: Valide le format et les colonnes des fichiers contrats
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_CONTRATS
        Colonnes: "id_contrat,id_client,type_offre,technologie,date_debut,date_fin"
        Separateur: ";"
        Encodage: UTF-8
        NonVide: true
        RepertoireErreur: £REP_ERR
