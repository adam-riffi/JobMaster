script:
  id_script: Contrats_Export_ExtractionCSV
  description: Extraction du SOCLE contrats vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.contrats
    REP_EXPORT: C:\data\contrats\export
    NOM_FICHIER: contrats_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table contrats en CSV
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
