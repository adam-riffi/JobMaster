-- Insertion agrégat journalier dans contrats_histo (BigQuery)
INSERT INTO £BQ_HISTO.contrats_histo (
  id_contrat,
  date_agregat,
  nb_enregistrements,
  date_maj
)
SELECT
  'contrats' AS id_contrat,
  CURRENT_DATE() AS date_agregat,
  COUNT(*) AS nb_enregistrements,
  CURRENT_TIMESTAMP() AS date_maj
FROM £BQ_SOCLE.contrats
WHERE DATE(date_maj) = CURRENT_DATE();
