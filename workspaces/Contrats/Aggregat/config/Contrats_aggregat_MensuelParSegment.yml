script:
  id_script: Contrats_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE contrats par segment métier

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.contrats
    TBL_AGGR: £BQ_HISTO.contrats_aggr_actifs_mensuel
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: BQ
        Requete: Contrats_aggregat_delete_mensuel.gql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: BQ
        Requete: Contrats_aggregat_insert_mensuel_segment.gql
