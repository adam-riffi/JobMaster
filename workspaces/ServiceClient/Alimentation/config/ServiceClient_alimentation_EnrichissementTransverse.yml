script:
  id_script: ServiceClient_Alimentation_EnrichissementTransverse
  description: Enrichissement du SOCLE interactions avec données cross-domaine via transfert

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.interactions
    TBL_TMP_ENRICHI: £BQ_TMP.interactions_enrichi

  jobs:
    - job_id: job.run.sql
      description: Prépare la table enrichie en croisant avec données transverses
      parametres:
        Plateforme: BQ
        Requete: ServiceClient_alimentation_enrichissement_transverse.gql

    - job_id: job.run.transfert
      description: Transfère les données enrichies vers la plateforme cible
      parametres:
        PlateformeSource: BQ
        TableSource: £TBL_TMP_ENRICHI
        PlateformeCible: TD
        TableCible: £TD_TMP.interactions_enrichi_sync
        Mode: FULL
