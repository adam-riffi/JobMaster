script:
  id_script: ServiceClient_Alimentation_UpsertSocle
  description: Alimentation du SOCLE interactions depuis la staging par MERGE/UPSERT

  parametres_env:
    TBL_STAGING: £BQ_TMP.staging_interactions
    TBL_SOCLE: £BQ_SOCLE.interactions

  jobs:
    - job_id: job.run.sql
      description: Vérifie que la staging contient des données
      parametres:
        Plateforme: BQ
        Requete: ServiceClient_alimentation_check_staging.gql
        Variable: FLAG_STAGING_SERVICECLIENT

    - job_id: job.conditionnelle.si
      description: Upsert uniquement si la staging est peuplée
      parametres:
        Variable: FLAG_STAGING_SERVICECLIENT
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: MERGE staging → SOCLE interactions
          parametres:
            Plateforme: BQ
            Requete: ServiceClient_alimentation_upsert_socle.gql

        - job_id: job.run.create_view
          description: Rafraîchit la vue métier interactions
          parametres:
            Plateforme: BQ
            Table: £TBL_SOCLE
