-- Création de la table SOCLE interactions (BigQuery)
CREATE TABLE IF NOT EXISTS £BQ_SOCLE.interactions (
  id_interaction                      STRING NOT NULL
  id_client                           STRING
  date_interaction                    DATE
  canal_contact                       STRING
  motif                               STRING
  statut                              STRING
  duree_traitement                    INT64
  note_satisfaction                   INT64
  agent_id                            STRING
  date_maj                            TIMESTAMP
);
