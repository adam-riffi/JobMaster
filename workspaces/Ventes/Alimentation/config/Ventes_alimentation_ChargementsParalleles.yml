script:
  id_script: Ventes_Alimentation_ChargementsParalleles
  description: Chargement parallèle du SOCLE et de la table historique ventes

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.ventes
    TBL_HISTO: £BQ_HISTO.ventes_histo

  jobs:
    - job_id: job.process.parallele
      description: Alimente SOCLE et HISTO simultanément
      jobs:
        - job_id: job.run.sql
          description: Upsert SOCLE ventes
          parametres:
            Plateforme: BQ
            Requete: Ventes_alimentation_upsert_socle.gql

        - job_id: job.run.sql
          description: Insert historique ventes_histo
          parametres:
            Plateforme: BQ
            Requete: Ventes_alimentation_insert_histo.gql
