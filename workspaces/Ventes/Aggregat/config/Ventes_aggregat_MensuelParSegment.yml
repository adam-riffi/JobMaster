script:
  id_script: Ventes_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE ventes par segment métier

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.ventes
    TBL_AGGR: £BQ_HISTO.ventes_aggr_mensuel_canal
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: BQ
        Requete: Ventes_aggregat_delete_mensuel.gql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: BQ
        Requete: Ventes_aggregat_insert_mensuel_segment.gql
