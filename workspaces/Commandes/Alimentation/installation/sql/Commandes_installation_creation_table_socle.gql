-- Création de la table SOCLE commandes (BigQuery)
CREATE TABLE IF NOT EXISTS £BQ_SOCLE.commandes (
  id_commande                         STRING NOT NULL
  id_client                           STRING
  id_produit                          STRING
  date_commande                       DATE
  statut                              STRING
  canal_vente                         STRING
  montant_total                       NUMERIC
  date_livraison                      DATE
  date_maj                            TIMESTAMP
);
