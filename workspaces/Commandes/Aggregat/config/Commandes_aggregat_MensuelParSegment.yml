script:
  id_script: Commandes_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE commandes par segment métier

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.commandes
    TBL_AGGR: £BQ_HISTO.commandes_aggr_journalier
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: BQ
        Requete: Commandes_aggregat_delete_mensuel.gql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: BQ
        Requete: Commandes_aggregat_insert_mensuel_segment.gql
