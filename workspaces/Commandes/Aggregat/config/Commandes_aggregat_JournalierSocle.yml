script:
  id_script: Commandes_Aggregat_JournalierSocle
  description: Agrégation journalière du SOCLE commandes vers l'historique

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.commandes
    TBL_HISTO: £BQ_HISTO.commandes_histo
    PERIODE: £DATE

  jobs:
    - job_id: job.run.sql
      description: Vérifie que le SOCLE a été alimenté aujourd'hui
      parametres:
        Plateforme: BQ
        Requete: Commandes_aggregat_check_socle_jour.gql
        Variable: FLAG_SOCLE_COMMANDES

    - job_id: job.conditionnelle.si
      description: Agrège uniquement si le SOCLE est à jour
      parametres:
        Variable: FLAG_SOCLE_COMMANDES
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: Insère les données du jour dans l'historique
          parametres:
            Plateforme: BQ
            Requete: Commandes_aggregat_insert_journalier.gql
