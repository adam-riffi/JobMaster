script:
  id_script: Reseau_Import_DeplacementTravail
  description: Déplacement des fichiers reseau de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\reseau\in
    REP_WORK: C:\data\reseau\work
    MASQUE_RESEAU: "^sites_reseau_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_RESEAU
        Mode: deplacement
