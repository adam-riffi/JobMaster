script:
  id_script: Reseau_Import_RapatriementSFTP
  description: Rapatriement des fichiers reseau depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://oss-network/sites/in
    REP_IN: C:\data\reseau\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers reseau depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
