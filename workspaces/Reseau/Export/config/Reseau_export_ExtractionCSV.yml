script:
  id_script: Reseau_Export_ExtractionCSV
  description: Extraction du SOCLE sites_reseau vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.sites_reseau
    REP_EXPORT: C:\data\reseau\export
    NOM_FICHIER: reseau_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table sites_reseau en CSV
      parametres:
        Plateforme: TD
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
