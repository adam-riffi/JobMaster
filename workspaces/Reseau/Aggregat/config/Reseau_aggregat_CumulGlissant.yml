script:
  id_script: Reseau_Aggregat_CumulGlissant
  description: Calcul des cumuls glissants sur 12 mois pour le domaine reseau

  parametres_env:
    TBL_HISTO: £TD_HISTO.sites_reseau_histo
    TBL_AGGR: £TD_HISTO.reseau_aggr_kpi_journalier

  jobs:
