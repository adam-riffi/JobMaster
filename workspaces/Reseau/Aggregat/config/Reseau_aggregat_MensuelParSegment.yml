script:
  id_script: Reseau_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE sites_reseau par segment métier

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.sites_reseau
    TBL_AGGR: £TD_HISTO.reseau_aggr_kpi_journalier
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: TD
        Requete: Reseau_aggregat_delete_mensuel.dql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: TD
        Requete: Reseau_aggregat_insert_mensuel_segment.dql
