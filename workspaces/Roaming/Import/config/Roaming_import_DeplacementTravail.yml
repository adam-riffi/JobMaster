script:
  id_script: Roaming_Import_DeplacementTravail
  description: Déplacement des fichiers roaming de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\roaming\in
    REP_WORK: C:\data\roaming\work
    MASQUE_ROAMING: "^roaming_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_ROAMING
        Mode: deplacement
