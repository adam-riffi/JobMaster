script:
  id_script: Roaming_Import_RapatriementSFTP
  description: Rapatriement des fichiers roaming depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://clearing-house/roaming/in
    REP_IN: C:\data\roaming\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers roaming depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
