script:
  id_script: Roaming_Alimentation_ChargementsParalleles
  description: Chargement parallèle du SOCLE et de la table historique roaming

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.roaming
    TBL_HISTO: £TD_HISTO.roaming_histo

  jobs:
    - job_id: job.process.parallele
      description: Alimente SOCLE et HISTO simultanément
      jobs:
        - job_id: job.run.sql
          description: Upsert SOCLE roaming
          parametres:
            Plateforme: TD
            Requete: Roaming_alimentation_upsert_socle.dql

        - job_id: job.run.sql
          description: Insert historique roaming_histo
          parametres:
            Plateforme: TD
            Requete: Roaming_alimentation_insert_histo.dql
