script:
  id_script: Roaming_Aggregat_JournalierSocle
  description: Agrégation journalière du SOCLE roaming vers l'historique

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.roaming
    TBL_HISTO: £TD_HISTO.roaming_histo
    PERIODE: £DATE

  jobs:
    - job_id: job.run.sql
      description: Vérifie que le SOCLE a été alimenté aujourd'hui
      parametres:
        Plateforme: TD
        Requete: Roaming_aggregat_check_socle_jour.dql
        Variable: FLAG_SOCLE_ROAMING

    - job_id: job.conditionnelle.si
      description: Agrège uniquement si le SOCLE est à jour
      parametres:
        Variable: FLAG_SOCLE_ROAMING
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: Insère les données du jour dans l'historique
          parametres:
            Plateforme: TD
            Requete: Roaming_aggregat_insert_journalier.dql
