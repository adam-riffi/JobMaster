script:
  id_script: Roaming_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE roaming par segment métier

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.roaming
    TBL_AGGR: £TD_HISTO.roaming_aggr_mensuel_pays
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: TD
        Requete: Roaming_aggregat_delete_mensuel.dql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: TD
        Requete: Roaming_aggregat_insert_mensuel_segment.dql
