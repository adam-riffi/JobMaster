script:
  id_script: Roaming_Export_ExtractionCSV
  description: Extraction du SOCLE roaming vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.roaming
    REP_EXPORT: C:\data\roaming\export
    NOM_FICHIER: roaming_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table roaming en CSV
      parametres:
        Plateforme: TD
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
