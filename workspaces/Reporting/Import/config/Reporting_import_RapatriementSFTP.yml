script:
  id_script: Reporting_Import_RapatriementSFTP
  description: Rapatriement des fichiers reporting depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://bi-platform/kpi/in
    REP_IN: C:\data\reporting\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers reporting depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
