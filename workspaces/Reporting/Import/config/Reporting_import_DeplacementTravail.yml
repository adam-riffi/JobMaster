script:
  id_script: Reporting_Import_DeplacementTravail
  description: Déplacement des fichiers reporting de la zone d'entrée vers la zone de travail

  parametres_env:
    REP_IN: C:\data\reporting\in
    REP_WORK: C:\data\reporting\work
    MASQUE_REPORTING: "^kpi_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.manipulation
      description: Déplace les fichiers vers la zone de travail
      parametres:
        Source: £REP_IN
        Cible: £REP_WORK
        Masque: £MASQUE_REPORTING
        Mode: deplacement
