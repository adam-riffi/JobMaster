script:
  id_script: Reporting_Export_ExtractionCSV
  description: Extraction du SOCLE kpi_global vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.kpi_global
    REP_EXPORT: C:\data\reporting\export
    NOM_FICHIER: reporting_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table kpi_global en CSV
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
