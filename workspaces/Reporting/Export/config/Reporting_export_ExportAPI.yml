script:
  id_script: Reporting_Export_ExportAPI
  description: Export du SOCLE kpi_global vers l'API partenaire via extraction JSON

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.kpi_global
    REP_EXPORT: C:\data\reporting\export
    API_DEST: https://api.bi.telecom/kpi/push
    NOM_FICHIER: reporting_api_£DATETIME.json

  jobs:
    - job_id: job.table.extraction
      description: Extrait le SOCLE kpi_global en JSON
      parametres:
        Plateforme: BQ
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: json

    - job_id: job.externe.export
      description: Pousse le JSON vers l'API partenaire
      parametres:
        Source: £REP_EXPORT
        Cible: £API_DEST
        Type: api
