-- Création de la table SOCLE kpi_global (BigQuery)
CREATE TABLE IF NOT EXISTS £BQ_SOCLE.kpi_global (
  id_kpi                              STRING NOT NULL
  periode                             STRING
  domaine                             STRING
  indicateur                          STRING
  valeur                              NUMERIC
  unite                               STRING
  date_calcul                         TIMESTAMP
  date_maj                            TIMESTAMP
);
