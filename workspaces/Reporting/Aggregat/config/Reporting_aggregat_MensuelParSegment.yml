script:
  id_script: Reporting_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE kpi_global par segment métier

  parametres_env:
    TBL_SOCLE: £BQ_SOCLE.kpi_global
    TBL_AGGR: £BQ_HISTO.reporting_aggr_mensuel_direction
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: BQ
        Requete: Reporting_aggregat_delete_mensuel.gql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: BQ
        Requete: Reporting_aggregat_insert_mensuel_segment.gql
