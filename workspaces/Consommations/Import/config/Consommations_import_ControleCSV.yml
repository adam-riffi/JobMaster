script:
  id_script: Consommations_Import_ControleCSV
  description: Validation structurelle des fichiers consommations avant chargement en staging

  parametres_env:
    REP_WORK: C:\data\consommations\work
    REP_ERR: C:\data\consommations\erreur
    MASQUE_CONSOMMATIONS: "^cdr_voix_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.controle
      description: Valide le format et les colonnes des fichiers consommations
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_CONSOMMATIONS
        Colonnes: "id_cdr,id_client,date_appel,heure_appel,duree_secondes,type_trafic"
        Separateur: "|"
        Encodage: UTF-8
        NonVide: true
        RepertoireErreur: £REP_ERR
