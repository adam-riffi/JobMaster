script:
  id_script: Consommations_Aggregat_CumulGlissant
  description: Calcul des cumuls glissants sur 12 mois pour le domaine consommations

  parametres_env:
    TBL_HISTO: £TD_HISTO.cdr_voix_histo
    TBL_AGGR: £TD_HISTO.cdr_aggr_journalier_client

  jobs:
    - job_id: job.run.sql
      description: Recalcule le cumul glissant 12 mois
      parametres:
        Plateforme: TD
        Requete: Consommations_aggregat_cumul_glissant_12m.dql
