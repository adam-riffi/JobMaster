script:
  id_script: Consommations_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE cdr_voix par segment métier

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.cdr_voix
    TBL_AGGR: £TD_HISTO.cdr_aggr_journalier_client
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: TD
        Requete: Consommations_aggregat_delete_mensuel.dql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: TD
        Requete: Consommations_aggregat_insert_mensuel_segment.dql
