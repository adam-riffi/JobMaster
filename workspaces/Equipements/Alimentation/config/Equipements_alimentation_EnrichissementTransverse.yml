script:
  id_script: Equipements_Alimentation_EnrichissementTransverse
  description: Enrichissement du SOCLE equipements avec données cross-domaine via transfert

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.equipements
    TBL_TMP_ENRICHI: £TD_TMP.equipements_enrichi

  jobs:
    - job_id: job.run.sql
      description: Prépare la table enrichie en croisant avec données transverses
      parametres:
        Plateforme: TD
        Requete: Equipements_alimentation_enrichissement_transverse.dql

    - job_id: job.run.transfert
      description: Transfère les données enrichies vers la plateforme cible
      parametres:
        PlateformeSource: TD
        TableSource: £TBL_TMP_ENRICHI
        PlateformeCible: BQ
        TableCible: £BQ_TMP.equipements_enrichi_sync
        Mode: FULL
