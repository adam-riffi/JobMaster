script:
  id_script: Equipements_Import_TraitementBatch
  description: Chargement en masse des fichiers equipements en staging puis archivage

  parametres_env:
    REP_WORK: C:\data\equipements\work
    REP_ARCH: C:\data\equipements\archive
    MASQUE_EQUIPEMENTS: "^equipements_\d{8}\.csv$"
    TBL_STAGING: £TD_TMP.staging_equipements

  jobs:
    - job_id: job.fichier.comptage
      description: Compte les fichiers à traiter
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_EQUIPEMENTS
        Variable: NB_FICHIERS_EQUIPEMENTS

    - job_id: job.conditionnelle.si
      description: Lance le batch uniquement si des fichiers sont présents
      parametres:
        Variable: NB_FICHIERS_EQUIPEMENTS
        Valeur: "0"

    - job_id: job.process.batch
      description: Charge la staging depuis tous les fichiers puis archive
      parametres:
        Source: £REP_WORK
        SAS: £REP_WORK
        Archive: £REP_ARCH
      jobs:
        - job_id: job.run.sql
          description: Charge les fichiers dans la table staging TD
          parametres:
            Plateforme: TD
            Requete: Equipements_import_chargement_staging.dql

        - job_id: job.fichier.manipulation
          description: Archive les fichiers traités
          parametres:
            Source: £REP_WORK
            Cible: £REP_ARCH
            Masque: £MASQUE_EQUIPEMENTS
            Mode: deplacement

    - job_id: job.fichier.effacement
      description: Purge les archives de plus de 3 mois
      parametres:
        Source: £REP_ARCH
        Duree: 3
