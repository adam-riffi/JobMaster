script:
  id_script: Equipements_Import_ControleCSV
  description: Validation structurelle des fichiers equipements avant chargement en staging

  parametres_env:
    REP_WORK: C:\data\equipements\work
    REP_ERR: C:\data\equipements\erreur
    MASQUE_EQUIPEMENTS: "^equipements_\d{8}\.csv$"

  jobs:
    - job_id: job.fichier.controle
      description: Valide le format et les colonnes des fichiers equipements
      parametres:
        Source: £REP_WORK
        Masque: £MASQUE_EQUIPEMENTS
        Colonnes: "id_equipement,id_client,type_equipement,marque,modele,imei"
        Separateur: "|"
        Encodage: UTF-8
        NonVide: true
        RepertoireErreur: £REP_ERR
