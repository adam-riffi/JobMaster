script:
  id_script: Equipements_Import_RapatriementSFTP
  description: Rapatriement des fichiers equipements depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://device-management/equipements/in
    REP_IN: C:\data\equipements\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers equipements depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
