script:
  id_script: Portabilite_Import_RapatriementSFTP
  description: Rapatriement des fichiers portabilite depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://porting-clearinghouse/portages/in
    REP_IN: C:\data\portabilite\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers portabilite depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
