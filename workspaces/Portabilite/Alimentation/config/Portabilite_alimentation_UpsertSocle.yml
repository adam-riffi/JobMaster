script:
  id_script: Portabilite_Alimentation_UpsertSocle
  description: Alimentation du SOCLE portages depuis la staging par MERGE/UPSERT

  parametres_env:
    TBL_STAGING: £TD_TMP.staging_portages
    TBL_SOCLE: £TD_SOCLE.portages

  jobs:
    - job_id: job.run.sql
      description: Vérifie que la staging contient des données
      parametres:
        Plateforme: TD
        Requete: Portabilite_alimentation_check_staging.dql
        Variable: FLAG_STAGING_PORTABILITE

    - job_id: job.conditionnelle.si
      description: Upsert uniquement si la staging est peuplée
      parametres:
        Variable: FLAG_STAGING_PORTABILITE
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: MERGE staging → SOCLE portages
          parametres:
            Plateforme: TD
            Requete: Portabilite_alimentation_upsert_socle.dql

        - job_id: job.run.create_view
          description: Rafraîchit la vue métier portages
          parametres:
            Plateforme: TD
            Table: £TBL_SOCLE
