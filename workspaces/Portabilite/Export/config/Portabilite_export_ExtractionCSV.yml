script:
  id_script: Portabilite_Export_ExtractionCSV
  description: Extraction du SOCLE portages vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.portages
    REP_EXPORT: C:\data\portabilite\export
    NOM_FICHIER: portabilite_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table portages en CSV
      parametres:
        Plateforme: TD
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
