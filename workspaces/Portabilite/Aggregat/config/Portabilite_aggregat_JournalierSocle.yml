script:
  id_script: Portabilite_Aggregat_JournalierSocle
  description: Agrégation journalière du SOCLE portages vers l'historique

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.portages
    TBL_HISTO: £TD_HISTO.portages_histo
    PERIODE: £DATE

  jobs:
    - job_id: job.run.sql
      description: Vérifie que le SOCLE a été alimenté aujourd'hui
      parametres:
        Plateforme: TD
        Requete: Portabilite_aggregat_check_socle_jour.dql
        Variable: FLAG_SOCLE_PORTABILITE

    - job_id: job.conditionnelle.si
      description: Agrège uniquement si le SOCLE est à jour
      parametres:
        Variable: FLAG_SOCLE_PORTABILITE
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: Insère les données du jour dans l'historique
          parametres:
            Plateforme: TD
            Requete: Portabilite_aggregat_insert_journalier.dql
