script:
  id_script: Portabilite_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE portages par segment métier

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.portages
    TBL_AGGR: £TD_HISTO.portabilite_aggr_mensuel_operateur
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: TD
        Requete: Portabilite_aggregat_delete_mensuel.dql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: TD
        Requete: Portabilite_aggregat_insert_mensuel_segment.dql
