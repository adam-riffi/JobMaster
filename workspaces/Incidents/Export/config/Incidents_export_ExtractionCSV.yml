script:
  id_script: Incidents_Export_ExtractionCSV
  description: Extraction du SOCLE incidents vers fichiers CSV datés

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.incidents
    REP_EXPORT: C:\data\incidents\export
    NOM_FICHIER: incidents_£DATE.csv

  jobs:
    - job_id: job.table.extraction
      description: Extrait la table incidents en CSV
      parametres:
        Plateforme: TD
        TableSource: £TBL_SOCLE
        Destination: £REP_EXPORT
        NomFichier: £NOM_FICHIER
        Format: csv
