script:
  id_script: Incidents_Aggregat_JournalierSocle
  description: Agrégation journalière du SOCLE incidents vers l'historique

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.incidents
    TBL_HISTO: £TD_HISTO.incidents_histo
    PERIODE: £DATE

  jobs:
    - job_id: job.run.sql
      description: Vérifie que le SOCLE a été alimenté aujourd'hui
      parametres:
        Plateforme: TD
        Requete: Incidents_aggregat_check_socle_jour.dql
        Variable: FLAG_SOCLE_INCIDENTS

    - job_id: job.conditionnelle.si
      description: Agrège uniquement si le SOCLE est à jour
      parametres:
        Variable: FLAG_SOCLE_INCIDENTS
        Valeur: "OUI"
      jobs:
        - job_id: job.run.sql
          description: Insère les données du jour dans l'historique
          parametres:
            Plateforme: TD
            Requete: Incidents_aggregat_insert_journalier.dql
