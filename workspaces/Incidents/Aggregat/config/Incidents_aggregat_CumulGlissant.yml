script:
  id_script: Incidents_Aggregat_CumulGlissant
  description: Calcul des cumuls glissants sur 12 mois pour le domaine incidents

  parametres_env:
    TBL_HISTO: £TD_HISTO.incidents_histo
    TBL_AGGR: £TD_HISTO.incidents_aggr_journalier_severite

  jobs:
    - job_id: job.run.sql
      description: Recalcule le cumul glissant 12 mois
      parametres:
        Plateforme: TD
        Requete: Incidents_aggregat_cumul_glissant_12m.dql
