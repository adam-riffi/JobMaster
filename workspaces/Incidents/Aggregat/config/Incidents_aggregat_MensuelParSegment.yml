script:
  id_script: Incidents_Aggregat_MensuelParSegment
  description: Agrégation mensuelle du SOCLE incidents par segment métier

  parametres_env:
    TBL_SOCLE: £TD_SOCLE.incidents
    TBL_AGGR: £TD_HISTO.incidents_aggr_journalier_severite
    PERIODE: £YEAR£MONTH

  jobs:
    - job_id: job.run.sql
      description: Supprime les agrégats du mois courant avant recalcul
      parametres:
        Plateforme: TD
        Requete: Incidents_aggregat_delete_mensuel.dql

    - job_id: job.run.sql
      description: Calcule et insère les agrégats mensuels par segment
      parametres:
        Plateforme: TD
        Requete: Incidents_aggregat_insert_mensuel_segment.dql
