script:
  id_script: Incidents_Import_RapatriementSFTP
  description: Rapatriement des fichiers incidents depuis le SFTP source vers la zone d'entrée

  parametres_env:
    SFTP_SOURCE: sftp://noc-platform/incidents/in
    REP_IN: C:\data\incidents\in

  jobs:
    - job_id: job.externe.import
      description: Récupère les fichiers incidents depuis le SFTP
      parametres:
        Source: £SFTP_SOURCE
        Cible: £REP_IN
        Type: sftp
